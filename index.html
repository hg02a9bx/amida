<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>町内会班長あみだくじ</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<style>

body{
font-family:sans-serif;
text-align:center;
background:#f4f4f4;
margin:0;
}

.container{
background:white;
max-width:900px;
margin:auto;
padding:20px;
}

input{
font-size:18px;
padding:10px;
width:70%;
max-width:300px;
}

#lineButtons button{

font-size:20px;
width:70px;
height:60px;
margin:6px;
border:none;
border-radius:10px;
background:#2196F3;
color:white;

}

.numberBtn{

font-size:18px;
height:55px;
width:65px;
margin:6px;
border:none;
border-radius:10px;
background:#4CAF50;
color:white;

}

.numberBtn.selected{
background:#2196F3;
}

.numberBtn.taken{
background:#999;
pointer-events:none;
}

#buttons{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

canvas{
width:100%;
max-width:800px;
border:1px solid #ccc;
margin-top:20px;
}

.nameRow{
display:flex;
justify-content:space-between;
margin-top:10px;
}

</style>
</head>

<body>

<h2>あみだくじ</h2>

<div class="container">

<input id="name" placeholder="名前">

<p>横線追加</p>

<div id="lineButtons">

<button onclick="selectLines(0)">0</button>
<button onclick="selectLines(1)">1</button>
<button onclick="selectLines(2)">2</button>
<button onclick="selectLines(3)">3</button>

</div>

<p>選択横線: <span id="selectedLines">0</span></p>

<p>番号</p>

<div id="buttons"></div>

<p>選択番号: <span id="selected">なし</span></p>

<button onclick="confirmEntry()">決定</button>

<p id="status"></p>

<div id="names" class="nameRow"></div>

<canvas id="amida" width="800" height="500"></canvas>

<div id="result"></div>

</div>

<script>

const MAX=13
const STEPS=15

let selectedLines=0
let selectedNumber=null
let ladders=[]
let goal=null

const firebaseConfig={
apiKey:"AIzaSyCVBY1Z0ta7al-brLKTQ6WyjDlLYk0fkDU",
authDomain:"amida2.firebaseapp.com",
databaseURL:"https://amida2-default-rtdb.firebaseio.com",
projectId:"amida2"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.database()

const canvas=document.getElementById("amida")
const ctx=canvas.getContext("2d")

function drawVertical(){

ctx.clearRect(0,0,canvas.width,canvas.height)

let w=canvas.width/(MAX+1)

for(let i=1;i<=MAX;i++){

ctx.beginPath()
ctx.moveTo(w*i,40)
ctx.lineTo(w*i,canvas.height)
ctx.stroke()

}

}

drawVertical()

for(let i=1;i<=MAX;i++){

let b=document.createElement("button")

b.innerText=i
b.className="numberBtn"
b.id="numBtn"+i

b.onclick=()=>selectNumber(i)

document.getElementById("buttons").appendChild(b)

}

function selectLines(num){

selectedLines=num

document.getElementById("selectedLines").innerText=num

}

function selectNumber(num){

selectedNumber=num

document.getElementById("selected").innerText=num

for(let i=1;i<=MAX;i++){

document.getElementById("numBtn"+i).classList.remove("selected")

}

document.getElementById("numBtn"+num).classList.add("selected")

}

function confirmEntry(){

let name=document.getElementById("name").value.trim()

if(!name){
alert("名前を入力してください")
return
}

if(selectedNumber===null){
alert("番号を選んでください")
return
}

db.ref("meta/lastPlayer").once("value").then(last=>{

if(last.val()===name){
alert("同じ人が続けて選べません")
return
}

db.ref("amida/"+selectedNumber).once("value").then(s=>{

if(s.exists()){
alert("その番号は選ばれています")
return
}

db.ref("amida/"+selectedNumber).set({
name:name,
add:selectedLines
})

addLadders(selectedLines)

db.ref("meta/lastPlayer").set(name)

})

})

}

function addLadders(count){

for(let i=0;i<count;i++){

let y=Math.floor(Math.random()*STEPS)
let x=Math.floor(Math.random()*(MAX-1))

db.ref("ladders").push({
x:x,
y:y
})

}

}

db.ref("ladders").on("value",snap=>{

ladders=[]

snap.forEach(c=>{
ladders.push(c.val())
})

drawFull()

})

db.ref("amida").on("value",snap=>{

let data=snap.val()||{}

for(let i=1;i<=MAX;i++){

let btn=document.getElementById("numBtn"+i)

btn.classList.remove("taken")

}

Object.keys(data).forEach(num=>{

let btn=document.getElementById("numBtn"+num)

if(btn){
btn.classList.add("taken")
}

})

showNames(data)

if(Object.keys(data).length===MAX){

finishGame()

}

})

function showNames(data){

let row=document.getElementById("names")

row.innerHTML=""

for(let i=1;i<=MAX;i++){

let d=document.createElement("div")

if(data[i]){
d.innerText=data[i].name
}else{
d.innerText="?"
}

row.appendChild(d)

}

}

function drawFull(){

drawVertical()

let w=canvas.width/(MAX+1)
let h=canvas.height/(STEPS+2)

ladders.forEach(l=>{

let y=h*(l.y+1)

ctx.beginPath()
ctx.moveTo(w*(l.x+1),y)
ctx.lineTo(w*(l.x+2),y)
ctx.stroke()

})

}

function finishGame(){

db.ref("result/goal").once("value").then(s=>{

if(s.exists()){

goal=s.val()

}else{

goal=Math.floor(Math.random()*MAX)

db.ref("result/goal").set(goal)

}

startAnimation()

})

}

function reversePath(goal){

let x=goal
let path=[]

for(let y=STEPS-1;y>=0;y--){

let left=ladders.find(l=>l.y===y && l.x===x-1)
let right=ladders.find(l=>l.y===y && l.x===x)

if(left) x--
else if(right) x++

path.push({x:x,y:y})

}

return path

}

function startAnimation(){

let path=reversePath(goal)

let w=canvas.width/(MAX+1)
let h=canvas.height/(STEPS+2)

let i=0

function step(){

if(i>=path.length){

let winner=path[path.length-1].x+1

db.ref("amida/"+winner).once("value").then(s=>{

let name=s.val().name

document.getElementById("result").innerText=
"当たりは "+name+" さん"

})

return

}

let p=path[i]

ctx.beginPath()

ctx.strokeStyle="red"
ctx.lineWidth=8
ctx.lineCap="round"

ctx.moveTo(w*(p.x+1),h*(p.y+1))
ctx.lineTo(w*(p.x+1),h*(p.y))

ctx.stroke()

i++

setTimeout(step,120)

}

step()

}

</script>

</body>
</html>
